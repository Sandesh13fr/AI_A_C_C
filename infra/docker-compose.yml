services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: aw_compliance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    env_file:
      - ../backend/.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/aw_compliance
      SYNC_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aw_compliance
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO
    env_file:
      - ../backend/.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/aw_compliance
      SYNC_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aw_compliance
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
